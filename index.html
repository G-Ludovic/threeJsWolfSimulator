<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/logo/wolfLogo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf Style Simulator</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

  <article>
    <h1>Wolf Style Simulator</h1>
    <p>Utilisation de Three.js pour afficher et animer un modèle 3D interactif.</p>
    <p>Contrôles:</p>
    <ul>
      <li>Molette pour zoomer/dézoomer</li>
      <li>Maintenir click droit et déplacer le personnage avec la souris</li>
      <li>Maintenir click gauche et glisser pour faire tourner la vue</li>
    </ul>
  </article>

  <!-- Canvas 3D -->
  <canvas class="myWebGL3d"></canvas>

  <!-- UI Overlay -->
  <div class="ui">
    <button id="toggleRotation">⏸ Stop rotation</button>

    <div class="slider-group">
      <label for="speedSlider">Vitesse rotation</label>
      <input type="range" id="speedSlider" min="0" max="0.05" step="0.001" value="0.005">
    </div>

    <div class="slider-group">
      <label for="lightSlider">Intensité lumière</label>
      <input type="range" id="lightSlider" min="0" max="250" step="0.1" value="5">
    </div>

    <!-- <div class="slider-group">
      <label for="furColor">Couleur de Fourrure</label>
      <input type="color" id="furColor" value="#ffffff">
    </div> -->

    <div class="slider-group">
      <label for="furTexture">Texture fourrure</label>
      <select id="furTexture">
        <option value="Fur_silver_grey.png" selected>Gris silver</option>
        <option value="Fur_martre.png">Marbré Blanc</option>
        <option value="Fur_silver.png">Blanc Argentée</option>
        <option value="Wolf_Fur.jpg">Kami Sauvage</option>
        <option value="Fur_Rosettes_noires.png">Rosettes noires</option>
        <option value="Fur_silver_black.png">Noir Argentée</option>
        <option value="Fur_black.png">Noir sauvage</option>
      </select>
    </div>

    <div class="slider-group">
      <label for="bgColor">Couleur de fond</label>
      <input type="color" id="bgColor" value="#000000">
      <button id="applyBgColor">Appliquer</button>
    </div>
  </div>

  <!-- Script -->
  <script type="module" src="index.js"></script>

</body>

</html>
